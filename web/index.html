<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Randers hide and seek</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <button id="mobile-panel-toggle" class="mobile-panel-toggle secondary-button" type="button">Panel</button>
    <div class="shell">
      <aside class="panel">
        <button id="mobile-panel-handle" class="mobile-panel-handle" type="button" aria-label="Åbn eller luk panel">
          <span class="mobile-panel-grip"></span>
        </button>
        <h1>Randers hide and seek</h1>
        <p class="note" id="boundary-note"></p>

        <form id="search-form" class="search-form">
          <label for="address-input">Adresse</label>
          <div class="search-row">
            <input id="address-input" autocomplete="off" placeholder="Sognegade 1, Randers" />
          </div>
          <ul id="address-suggestions" class="suggestion-list" hidden></ul>
        </form>

        <div class="actions">
          <button class="secondary-button" id="gps-button" type="button">Brug min position</button>
          <button class="secondary-button" id="toggle-sogne" type="button">Vis/skjul sogne</button>
          <button class="secondary-button" id="toggle-afstemning" type="button">Vis/skjul afstemningsområder</button>
          <a class="secondary-button" href="./print-map.pdf" target="_blank" rel="noreferrer">Print-PDF</a>
        </div>

        <section class="result" id="result-box">
          <h2>Resultat</h2>
          <p id="result-status">Ingen position valgt endnu.</p>
          <dl>
            <div>
              <dt>Sogn</dt>
              <dd id="result-sogn">-</dd>
            </div>
            <div>
              <dt>Postnummer</dt>
              <dd id="result-postnummer">-</dd>
            </div>
            <div>
              <dt>Afstemningsområde</dt>
              <dd id="result-afstemning">-</dd>
            </div>
          </dl>
        </section>

        <section class="legend">
          <h2>Legend</h2>
          <ul>
            <li><span class="swatch boundary"></span>Spillegrænse</li>
            <li><span class="swatch route"></span>Inkluderede busruter</li>
            <li><span class="swatch stop"></span>Gyldigt stoppested</li>
          </ul>
        </section>

        <p class="site-link">
          <a class="repo-link" href="https://github.com/soetang/hide_and_seek-randers" target="_blank" rel="noreferrer" aria-label="GitHub repository for hide_and_seek-randers">
            <svg viewBox="0 0 24 24" aria-hidden="true" class="repo-link-icon">
              <path fill="currentColor" d="M12 .5C5.65.5.5 5.66.5 12.03c0 5.1 3.3 9.42 7.88 10.95.58.1.79-.25.79-.56v-2.17c-3.2.7-3.88-1.55-3.88-1.55-.53-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.7 1.26 3.36.97.1-.75.4-1.27.73-1.56-2.56-.3-5.25-1.29-5.25-5.74 0-1.27.45-2.3 1.19-3.1-.12-.3-.52-1.52.12-3.16 0 0 .97-.31 3.18 1.18a11.02 11.02 0 0 1 5.8 0c2.21-1.5 3.18-1.18 3.18-1.18.64 1.64.24 2.86.12 3.16.74.8 1.19 1.83 1.19 3.1 0 4.46-2.69 5.44-5.26 5.74.42.36.78 1.05.78 2.12v3.15c0 .31.21.67.8.56A11.54 11.54 0 0 0 23.5 12.03C23.5 5.66 18.35.5 12 .5Z"/>
            </svg>
            <span>GitHub repository</span>
          </a>
        </p>
      </aside>
      <main>
        <div id="map"></div>
      </main>
    </div>
  </body>
</html>
